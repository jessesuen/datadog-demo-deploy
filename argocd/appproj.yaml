apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: datadog-demo
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace
  destinations:
  - name: '*'
    namespace: datadog-demo-*
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  sourceRepos:
  - https://github.com/jessesuen/datadog-demo-deploy.git
