image:
  repository: ghcr.io/jessesuen/otel-app
  pullPolicy: Always
  tag: 0.1.0

replicaCount: 1

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

podAnnotations: {}

resources: {}

postSyncJob:
  enabled: true

env:
  LAMBDA_URL: https://xxxxxxxxxxxxxxxxx.lambda-url.us-west-2.on.aws/
